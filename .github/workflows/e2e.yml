name: E2E (live SDK)

# Real end-to-end tests against a live Filen test account. Not part of per-push CI (uses the account +
# bandwidth) — runs on demand and nightly. The deterministic suite (test.yml) still gates every push/PR.
on:
    workflow_dispatch:
    schedule:
        # Nightly at 03:00 UTC.
        - cron: "0 3 * * *"

jobs:
    e2e:
        name: E2E (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30
        strategy:
            fail-fast: false
            # Serialize the OS matrix: all three runners share ONE test account (and its trash), so they
            # must not run concurrently.
            max-parallel: 1
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: E2E tests
              run: npm run test:e2e
              env:
                  FILEN_TEST_EMAIL: ${{ secrets.FILEN_TEST_EMAIL }}
                  FILEN_TEST_PASSWORD: ${{ secrets.FILEN_TEST_PASSWORD }}
                  FILEN_TEST_2FA: ${{ secrets.FILEN_TEST_2FA }}
