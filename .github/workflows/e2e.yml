name: E2E (live SDK)

# Real end-to-end tests against a live Filen test account. Not part of per-push CI (uses the account +
# bandwidth) — runs on demand and nightly. The deterministic suite (test.yml) still gates every push/PR.
on:
    workflow_dispatch:
    schedule:
        # Nightly at 03:00 UTC.
        - cron: "0 3 * * *"

jobs:
    e2e:
        name: E2E (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 90
        strategy:
            fail-fast: false
            # The runners share ONE account but each world uses a truly-random remote /<uuid> + local tmp
            # dir, and account-wide emptyTrash only ever purges trashed test artifacts (never live items
            # under any /<uuid>), so parallel runs are safe.
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: E2E tests
              run: npm run test:e2e
              env:
                  # Preferred: a base64(JSON) authenticated SDK config — the harness reuses the session
                  # instead of logging in, so parallel matrix runs don't trip the account's login rate
                  # limit. Email/password remain as a fallback when the config secret isn't set.
                  FILEN_SYNC_LEGACY_E2E_SDK_CONFIG: ${{ secrets.FILEN_SYNC_LEGACY_E2E_SDK_CONFIG }}
                  FILEN_SYNC_LEGACY_E2E_EMAIL: ${{ secrets.FILEN_SYNC_LEGACY_E2E_EMAIL }}
                  FILEN_SYNC_LEGACY_E2E_PASSWORD: ${{ secrets.FILEN_SYNC_LEGACY_E2E_PASSWORD }}
