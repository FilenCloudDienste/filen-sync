name: E2E (live SDK)

# Real end-to-end tests against a live Filen test account. Runs on every push to main for live-backend
# coverage; the deterministic suite (test.yml) still gates every push/PR. Can also be dispatched manually,
# optionally targeting a single platform. A newer push supersedes the in-flight run for the same ref.
on:
    push:
        branches: ["main"]
    workflow_dispatch:
        inputs:
            platform:
                description: "Platform(s) to run"
                type: choice
                default: all
                options:
                    - all
                    - ubuntu-latest
                    - macos-latest
                    - windows-latest

# A newer commit on a ref cancels that ref's in-flight E2E run, so the slow (~40 min/platform) runs never
# pile up on the shared test account. Keyed per-ref so a main push and a manual branch run don't cancel
# each other.
concurrency:
    group: e2e-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Resolve the OS matrix: all three platforms by default, or a single one when a manual dispatch picks it.
    select:
        name: Select platforms
        runs-on: ubuntu-latest
        outputs:
            matrix: ${{ steps.pick.outputs.matrix }}
        steps:
            - id: pick
              shell: bash
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.platform }}" != "all" ]; then
                      echo "matrix={\"os\":[\"${{ inputs.platform }}\"]}" >> "$GITHUB_OUTPUT"
                  else
                      echo 'matrix={"os":["ubuntu-latest","macos-latest","windows-latest"]}' >> "$GITHUB_OUTPUT"
                  fi

    e2e:
        name: E2E (${{ matrix.os }})
        needs: select
        runs-on: ${{ matrix.os }}
        # Generous headroom: the live suite runs serially against one account and keeps growing (the
        # scale-hardening round added more multi-item live cases). A high cap avoids flaking a slow-but-healthy
        # run on a loaded runner; a genuine hang is still caught by the per-test timeouts below.
        timeout-minutes: 180
        strategy:
            fail-fast: false
            # The runners share ONE account but each world uses a truly-random remote /<uuid> + local tmp
            # dir, and account-wide emptyTrash only ever purges trashed test artifacts (never live items
            # under any /<uuid>), so parallel runs are safe.
            matrix: ${{ fromJSON(needs.select.outputs.matrix) }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: E2E tests
              run: npm run test:e2e
              env:
                  # Preferred: a base64(JSON) authenticated SDK config — the harness reuses the session
                  # instead of logging in, so parallel matrix runs don't trip the account's login rate
                  # limit. Email/password remain as a fallback when the config secret isn't set.
                  FILEN_SYNC_LEGACY_E2E_SDK_CONFIG: ${{ secrets.FILEN_SYNC_LEGACY_E2E_SDK_CONFIG }}
                  FILEN_SYNC_LEGACY_E2E_EMAIL: ${{ secrets.FILEN_SYNC_LEGACY_E2E_EMAIL }}
                  FILEN_SYNC_LEGACY_E2E_PASSWORD: ${{ secrets.FILEN_SYNC_LEGACY_E2E_PASSWORD }}
