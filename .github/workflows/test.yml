name: Test

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
        types: [opened, synchronize, reopened]

jobs:
    test:
        name: Build and test (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        # The deterministic suite runs on all three platforms: the engine ships cross-platform and the
        # path rules it enforces (separators, illegal chars, reserved device names, per-OS length limits)
        # genuinely differ by OS, so they deserve to run on the real OS. The in-memory harness is
        # posix-normalized at its memfs boundary, so the identical suite runs everywhere.
        # The coverage gate is enforced once, on ubuntu (the canonical run); macOS/Windows run the full
        # suite without the gate to avoid per-OS coverage drift against the tight branch-coverage margin.
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      test: npm run test:coverage
                    - os: macos-latest
                      test: npm test
                    - os: windows-latest
                      test: npm test
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Type check (tests)
              run: npm run typecheck

            - name: Test
              run: ${{ matrix.test }}
